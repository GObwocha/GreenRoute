{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - GreenRoute Engine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global Static Assets -->
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body class="login-body">

    <div class="ambient-glow"></div>

    <main class="login-card">
        <header class="login-header">
            <div class="logo-container">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <h1 class="login-title">Administrator Portal</h1>
            <p class="login-subtitle">Sign in to manage maps and user accounts</p>
        </header>

        {% if error_message %}
        <div class="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>{{ error_message }}</span>
        </div>
        {% endif %}

        <form action="" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="username" name="username" class="form-input" placeholder="admin" required autofocus autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••••••" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-submit">Secure Authentication</button>
        </form>
    </main>

    <script src="{% static 'script.js' %}"></script>
</body>
</html>
